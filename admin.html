<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | MapGenius Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 2rem; background: #fff; box-shadow: var(--shadow-md); border-radius: var(--radius); overflow: hidden; }
    .admin-table th, .admin-table td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--gray-200); }
    .admin-table th { background: var(--primary); color: #fff; font-weight: 600; }
    .admin-table tr:hover { background: var(--gray-100); }
    .empty-msg { text-align: center; padding: 2rem; color: var(--gray-700); }
    .refresh-btn { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-brand">MapGenius Admin</div>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="contact.html">Contacto</a></li>
      <li><a href="admin.html" class="active">Admin</a></li>
    </ul>
  </nav>

  <div class="admin-container">
    <h2>Submissions de Contacto</h2>
    <button class="btn btn-primary refresh-btn" onclick="loadSubmissions()">Refrescar</button>
    <div id="submissionsArea"></div>
  </div>

  <script>
    async function loadSubmissions() {
      const area = document.getElementById('submissionsArea');
      area.innerHTML = '<p>Cargando...</p>';
      try {
        const resp = await fetch('/api/submissions');
        const data = await resp.json();
        if (!data.length) {
          area.innerHTML = '<p class="empty-msg">No hay envíos todavía.</p>';
          return;
        }
        let html = '<table class="admin-table"><thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Servicio</th><th>Presupuesto</th><th>Mensaje</th><th>Fecha</th></tr></thead><tbody>';
        data.forEach(row => {
          html += `<tr>
            <td>${row.id}</td>
            <td>${escapeHtml(row.name)}</td>
            <td>${escapeHtml(row.email)}</td>
            <td>${escapeHtml(row.service)}</td>
            <td>${escapeHtml(row.budget)}</td>
            <td>${escapeHtml(row.message)}</td>
            <td>${new Date(row.date).toLocaleString()}</td>
          </tr>`;
        });
        html += '</tbody></table>';
        area.innerHTML = html;
      } catch (err) {
        area.innerHTML = '<p class="empty-msg">Error al cargar los datos.</p>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadSubmissions();
  </script>
</body>
</html>
